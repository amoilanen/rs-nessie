name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: deb,rpm
            rust_targets: ''
          - os: macos-14
            bundles: dmg
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - os: windows-2022
            bundles: nsis
            rust_targets: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev \
            rpm \
            fakeroot \
            dpkg

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            app/src-tauri/target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm --prefix app ci

      - name: Build Tauri bundles (Linux)
        if: matrix.os == 'ubuntu-22.04'
        env:
          # Optional Linux signing inputs (no-op if absent)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm --prefix app run tauri build -- --bundles deb,rpm

      - name: Build Tauri bundles (macOS, universal)
        if: matrix.os == 'macos-14'
        env:
          # Optional Apple signing & notarization secrets (no-op if absent)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm --prefix app run tauri build -- --target universal-apple-darwin --bundles dmg

      - name: Build Tauri bundles (Windows)
        if: matrix.os == 'windows-2022'
        env:
          # Optional Windows code-signing inputs (no-op if absent)
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm --prefix app run tauri build -- --bundles nsis

      - name: Collect Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        id: collect-linux
        shell: bash
        run: |
          mkdir -p dist-artifacts
          shopt -s nullglob globstar
          for f in \
            app/src-tauri/target/release/bundle/deb/*.deb \
            app/src-tauri/target/release/bundle/rpm/*.rpm \
            target/release/bundle/deb/*.deb \
            target/release/bundle/rpm/*.rpm; do
            cp "$f" dist-artifacts/
          done
          ls -la dist-artifacts

      - name: Collect macOS artifacts
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          shopt -s nullglob globstar
          for f in \
            app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg \
            app/src-tauri/target/release/bundle/dmg/*.dmg \
            target/universal-apple-darwin/release/bundle/dmg/*.dmg \
            target/release/bundle/dmg/*.dmg; do
            cp "$f" dist-artifacts/
          done
          ls -la dist-artifacts

      - name: Collect Windows artifacts
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          $patterns = @(
            'app/src-tauri/target/release/bundle/nsis/*.exe',
            'target/release/bundle/nsis/*.exe'
          )
          foreach ($p in $patterns) {
            Get-ChildItem -Path $p -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_.FullName -Destination dist-artifacts/
            }
          }
          Get-ChildItem dist-artifacts

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: rs-nessie-${{ matrix.os }}
          path: dist-artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Create the release if it doesn't exist yet; tolerate races between matrix jobs.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automated release for $TAG." \
              --draft=false \
              --prerelease=false || true
          fi
          gh release upload "$TAG" dist-artifacts/* --clobber
